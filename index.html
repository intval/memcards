<!DOCTYPE html>
<html lang="en">
<head>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%231d4ed8'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cpath d='M26 72V34l24 24 24-24v38' fill='none' stroke='%23fff' stroke-width='13' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />

<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --card: #1e222b;
    --card-hi: #262b36;
    --text: #e8eaed;
    --muted: #9aa4b2;
    --accent: #3b82f6;
    --accent-press: #2563eb;
    --danger: #ef4444;
    --ok: #22c55e;
    --radius: 18px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #23272f;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 5;
  }
  header h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  header h1 span { color: var(--muted); font-weight: 400; }
  .btn {
    appearance: none;
    border: 0;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 14px;
    cursor: pointer;
    transition: background .12s, transform .06s;
  }
  .btn:active { background: var(--accent-press); transform: translateY(1px); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.secondary { background: #2a2f3a; }
  .btn.secondary:active { background: #333a47; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 16px 28px;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }

  .card {
    width: 100%;
    min-height: 46vh;
    background: linear-gradient(180deg, var(--card-hi), var(--card));
    border: 1px solid #2c313c;
    border-radius: var(--radius);
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 28px 22px;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: transform .06s;
  }
  .card:active { transform: scale(.995); }
  .prompt { font-size: clamp(26px, 8vw, 40px); font-weight: 700; }
  .answer {
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px dashed #39404c;
    width: 100%;
  }
  .answer .word { font-size: clamp(22px, 6.5vw, 32px); font-weight: 600; color: #cfe0ff; }

  /* example phrase shown with the card ("Einwand erheben") */
  .example {
    margin-top: 16px;
    font-size: clamp(16px, 4.5vw, 21px);
    color: var(--muted);
    font-style: italic;
  }
  .answer .example-answer {
    margin-top: 8px;
    font-size: clamp(15px, 4vw, 19px);
    color: #9db8e6;
    font-style: italic;
    font-weight: 400;
  }

  /* other translations + Russian, shown as bullet points under the answer */
  .answer .alts {
    list-style: none;
    margin: 16px 0 0;
    padding: 12px 0 0;
    border-top: 1px dashed #39404c;
    text-align: left;
    display: inline-block;
  }
  .answer .alts li {
    font-size: clamp(15px, 4vw, 18px);
    color: var(--muted);
    padding: 3px 0 3px 16px;
    position: relative;
  }
  .answer .alts li::before {
    content: "–";
    position: absolute;
    left: 0;
    color: #4b5361;
  }
  .answer .alts li.ru { color: #b6a4d8; margin-top: 4px; }

  .controls { width: 100%; display: flex; gap: 12px; }
  .controls .btn { flex: 1; padding: 16px; font-size: 17px; }

  .empty { text-align: center; color: var(--muted); padding: 30px 10px; }
  .empty .big { font-size: 42px; margin-bottom: 8px; }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 10px 16px calc(14px + env(safe-area-inset-bottom));
  }

  /* toast / status */
  #toast {
    position: fixed;
    left: 50%;
    bottom: calc(84px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px);
    background: #0b0d11;
    border: 1px solid #2c313c;
    color: var(--text);
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s, transform .2s;
    max-width: 90vw;
    z-index: 20;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err { border-color: var(--danger); }
  #toast.ok { border-color: var(--ok); }

  /* chooser modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 30;
    padding: 0 12px calc(16px + env(safe-area-inset-bottom));
  }
  .modal[hidden] { display: none; }
  .sheet {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid #2c313c;
    border-radius: 18px 18px 14px 14px;
    padding: 18px 16px 14px;
    box-shadow: 0 -8px 40px rgba(0,0,0,.5);
    animation: rise .16s ease-out;
  }
  @keyframes rise { from { transform: translateY(24px); opacity: .4; } to { transform: none; opacity: 1; } }
  .sheet-title { font-size: 17px; font-weight: 700; }
  .sheet-sub { color: var(--muted); font-size: 14px; margin: 2px 0 12px; }
  .sheet-list { display: flex; flex-direction: column; gap: 8px; max-height: 46vh; overflow-y: auto; }
  .sheet-list .btn { text-align: left; }
  .btn.ghost { background: transparent; color: var(--muted); margin-top: 12px; width: 100%; }
  .btn.ghost:active { background: #22262f; }

  /* translation chooser table */
  .tt-wrap { max-height: 52vh; overflow-y: auto; margin: 2px 0; border: 1px solid #2c313c; border-radius: 12px; -webkit-overflow-scrolling: touch; }
  .tt { width: 100%; border-collapse: collapse; }
  .tt tr { cursor: pointer; }
  .tt tr:not(:last-child) td { border-bottom: 1px solid #262b34; }
  .tt tr:active td { background: #22262f; }
  .tt td { padding: 11px 12px; font-size: 15px; }
  .tt .src { color: var(--muted); white-space: nowrap; }
  .tt .arrow { color: #4b5361; width: 1px; padding: 11px 2px; }
  .tt .trg { font-weight: 600; width: 99%; }
  .lang-badge {
    display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .04em;
    padding: 1px 5px; margin-right: 7px; border-radius: 5px;
    background: #2c313c; color: var(--muted); vertical-align: 1px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.35);
    border-top-color: white;
    border-radius: 50%;
    display: inline-block;
    vertical-align: -3px;
    margin-right: 8px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <header>
    <h1>Karten <span>· Deutsch</span></h1>
    <button class="btn" id="addBtn">＋ Add word</button>
  </header>

  <main id="main"><!-- card rendered here --></main>

  <footer id="footer"></footer>
  <div id="toast"></div>
  <div id="chooser" class="modal" hidden></div>

<script>
/* ============================================================
   Config
   ============================================================ */
// Generic CORS proxy (the Cloudflare Worker). Local dev: http://127.0.0.1:8787
const PROXY_URL = "https://cors-proxy.alex1165.workers.dev";

const STORE_KEY = "memcards.v1";
const DAY_MS = 24 * 60 * 60 * 1000;

// Wrap any URL so it goes through the CORS proxy.
function proxied(url) {
  return `${PROXY_URL}/?url=${encodeURIComponent(url)}`;
}

/* ============================================================
   Dictionary backend (swappable)
   The app talks to `backend.lookup(word)` only. To switch away from dict.cc,
   replace this adapter with one that returns the same shape:
     { pairs: [{ de, en }], suggestions: [word, ...] }
   `de` may carry a gender marker like "Hund {m}" (used to add the article).
   ============================================================ */
const dictccBackend = {
  async lookup(word) {
    const term = encodeURIComponent(word);
    // A single dict.cc query already returns BOTH directions — rows where the
    // German side is the headword and rows where the English side is — so one
    // fetch is enough (e.g. "bar" returns German bar→cash and English bar→Balken).
    const doc = await fetchDoc(proxied(`https://deen.dict.cc/?s=${term}`));
    const pairs = parsePairs(doc);
    const suggestions = uniq(parseSuggestions(doc))
      .filter((s) => s.toLowerCase() !== word.toLowerCase());
    return { pairs, suggestions };
  },
};
const backend = dictccBackend;

async function fetchDoc(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const html = await res.text();
  return new DOMParser().parseFromString(html, "text/html");
}

// Translation rows live in `td.td7nl` cells; they alternate English / German.
function parsePairs(doc) {
  const cells = [...doc.querySelectorAll("td.td7nl")].map(cellText);
  const en = [], de = [];
  cells.forEach((t, i) => (i % 2 === 0 ? en : de).push(t));
  const pairs = [];
  for (let i = 0; i < Math.min(en.length, de.length); i++) {
    if (en[i] && de[i]) pairs.push({ de: de[i], en: en[i] });
  }
  return pairs;
}

// Cleaned cell text: drop subject tags (<dfn>) and frequency (<div>), and
// [optional notes]; keep {gender} markers.
function cellText(td) {
  const clone = td.cloneNode(true);
  // <dfn> subject tags, <div> frequency bars, <sup> homograph indices.
  clone.querySelectorAll("dfn, div, sup").forEach((e) => e.remove());
  // dict.cc also marks homographs with a superscript number (Bar²) as a <span>
  // offset with top:-…px — drop those so "Bar2" collapses to "Bar".
  clone.querySelectorAll("span[style*='top:-']").forEach((e) => e.remove());
  return clone.textContent.replace(/\[[^\]]*\]/g, "").replace(/\s+/g, " ").trim();
}

// When a word isn't found, dict.cc lists "Ähnliche Begriffe" / "Similar terms".
function parseSuggestions(doc) {
  const head = [...doc.querySelectorAll("div.hl3")].find((h) =>
    /ähnliche begriffe|similar terms/i.test(h.textContent)
  );
  const td = head && head.closest("td");
  if (!td) return [];
  return [...td.querySelectorAll('a[href*="?s="]')]
    .map((a) => a.textContent.trim())
    .filter(Boolean);
}

function uniq(arr) {
  return [...new Set(arr)];
}

// From the full list of lookup pairs, keep the multi-word *usage phrases* for a
// word (e.g. for "Einwand": "Einwand erheben", "einen Einwand vorbringen") and
// drop the bare-headword rows ("Einwand" = "objection/demur/dissent"). Those
// bare rows are exactly the "1-to-1 same word" ones we don't want as examples.
// A row is kept when its German side is a phrase (has a space) that still
// mentions the word, or its English side does — keeping it relevant to the card.
function deriveExamples(pairs, baseDe, baseEn) {
  const bd = (baseDe || "").toLowerCase();
  const be = (baseEn || "").toLowerCase();
  const out = [], seen = new Set();
  for (const p of pairs) {
    const de = stripMarkers(p.de || ""), en = stripMarkers(p.en || "");
    if (!de || !en) continue;
    const del = de.toLowerCase(), enl = en.toLowerCase();
    if (!/\s/.test(de) || del === bd) continue;        // must be a phrase, not the headword
    if (bd && !del.includes(bd) && be && !enl.includes(be)) continue; // stay on-topic
    const key = del + "|" + enl;
    if (seen.has(key)) continue;
    seen.add(key);
    out.push({ de, en });
  }
  return out.slice(0, 24);
}

/* ============================================================
   Other-translations & Russian extraction
   ============================================================ */

// From dict.cc deen pairs, collect the single-word translations of `headword`
// found on `fromSide` ("en" or "de"), returning the opposite side's word.
// German results keep their {gender} marker so withArticle() can add the article
// at render time; English results are returned as plain words. Includes the main
// sense too — the renderer drops whatever matches the card's own answer word.
function altWords(pairs, headword, fromSide) {
  const q = matchKey(headword);
  const out = [], seen = new Set();
  for (const p of pairs) {
    const from = fromSide === "en" ? p.en : p.de;
    const to   = fromSide === "en" ? p.de : p.en;
    if (!from || !to) continue;
    if (matchKey(from) !== q) continue;      // row's source side must be the headword
    if (!isSingleWord(to)) continue;         // one-word translations only
    const clean = matchKey(to);
    if (!clean || seen.has(clean)) continue;
    seen.add(clean);
    out.push(fromSide === "en" ? deHyphen(to.trim()) : stripMarkers(to));
  }
  return out;
}

// Look a word up in a Russian dict.cc dictionary (deru = German→Russian,
// enru = English→Russian) and return the Russian translations. On those pages
// the Russian word sits in the LEFT/even cell and the source word in the RIGHT/
// odd cell (mirror of deen). We keep only rows whose source side is exactly the
// headword (not a phrase/idiom or a "Balken-" combining form).
async function lookupRussian(subdomain, srcWord) {
  const doc = await fetchDoc(proxied(`https://${subdomain}.dict.cc/?s=${encodeURIComponent(srcWord)}`));
  const cells = [...doc.querySelectorAll("td.td7nl")].map(cellText);
  const q = matchKey(srcWord);
  const out = [], seen = new Set();
  for (let i = 0; i + 1 < cells.length; i += 2) {
    const ru = cells[i], src = cells[i + 1];        // even = Russian, odd = source
    if (!ru || !src) continue;
    if (matchKey(src) !== q) continue;               // exact headword only…
    if (/-\s*$/.test(stripMarkers(src))) continue;   // …not a combining form ("Balken-")
    const w = stripMarkers(ru);
    if (!w || !/[а-яё]/i.test(w)) continue;          // must actually be Cyrillic
    const key = w.toLowerCase();
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(w);
  }
  return out;
}

// Russian for a card, honoring the source language it was added from
// ("EN" → enru, "DE" → deru). For older cards with no recorded source, try
// German→Russian first and fall back to English→Russian ("whichever has results").
async function lookupRussianForCard(card, baseDe, baseEn) {
  if (card.srcLang === "EN") return baseEn ? topRu(await lookupRussian("enru", baseEn)) : [];
  if (card.srcLang === "DE") return baseDe ? topRu(await lookupRussian("deru", baseDe)) : [];
  let ru = baseDe ? await lookupRussian("deru", baseDe) : [];
  if (!ru.length && baseEn) ru = await lookupRussian("enru", baseEn);
  return topRu(ru);
}
function topRu(list) { return list.slice(0, 6); }   // store a few; the card shows the top 3

/* ============================================================
   Storage (swappable backend)

   The app persists one JSON blob — the `state` object `{ cards }` — through a
   backend exposing `read()` / `write(blob)`. Swap `store` to change where cards
   live without touching app logic. That same blob is what exportData() /
   importData() move to and from Google Drive later.
   ============================================================ */
const localStorageStore = {
  async read() {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : null;
  },
  async write(blob) { localStorage.setItem(STORE_KEY, JSON.stringify(blob)); },
};

// In-browser database — larger quota, more robust than localStorage. Stores the
// blob under one key. Flip `store` below to make it the active backend.
const indexedDBStore = (() => {
  const [DB, STORE, KEY] = ["memcards", "state", "app"];
  let dbPromise;
  const open = () => (dbPromise ??= new Promise((resolve, reject) => {
    const req = indexedDB.open(DB, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  }));
  const tx = (mode, fn) => open().then(db => new Promise((resolve, reject) => {
    const t = db.transaction(STORE, mode);
    const req = fn(t.objectStore(STORE));
    t.oncomplete = () => resolve(req && req.result);
    t.onerror = t.onabort = () => reject(t.error);
  }));
  return {
    read: () => tx("readonly", s => s.get(KEY)).then(v => v ?? null),
    write: blob => tx("readwrite", s => s.put(blob, KEY)),
  };
})();

const store = localStorageStore;   // ← swap to indexedDBStore to move storage

const normalize = blob => ({ cards: Array.isArray(blob?.cards) ? blob.cards : [] });

// In-memory state; populated from `store` during boot (see bottom of file).
let state = { cards: [] };

// Persist current state. Fire-and-forget from call sites — the UI stays
// responsive and we surface any failure via a toast.
function save() {
  store.write(state).catch(err => toast(`Save failed: ${err.message}`, "err"));
}

// Google Drive sync seam (added later): exportData() yields the blob to upload;
// importData() replaces local data from a downloaded blob.
function exportData() { return state; }
async function importData(blob) {
  state = normalize(blob);
  await store.write(state);
  pickCurrent();
  render();
}

/* ============================================================
   SM-2
   quality: 5 = pass (Next without revealing), 2 = lapse (revealed)
   ============================================================ */
function newCard(de, en, examples) {
  const list = Array.isArray(examples) ? examples : [];
  return {
    id: cardId(de, en),
    de, en,
    examples: list,           // [{ de, en }] usage phrases (may be empty)
    examplesFetched: true,    // false only for pre-examples cards (backfilled lazily)
    altDe: null,              // other German translations ["Riegel {m}", ...] (null = not fetched)
    altEn: null,              // other English translations ["beam", ...] (null = not fetched)
    ru: null,                 // Russian translations ["балка", ...] (null = not fetched)
    srcLang: null,            // "DE"|"EN": language the card was looked up FROM (picks the RU direction)
    extrasFetched: false,     // whether altDe/altEn/ru enrichment has completed
    ef: 2.5,
    interval: 0,
    repetitions: 0,
    due: Date.now(),          // new cards are due immediately
    createdAt: Date.now(),
  };
}
function cardId(de, en) {
  return (de + "|" + en).toLowerCase().replace(/\s+/g, " ").trim();
}
function grade(card, quality) {
  if (quality >= 3) {
    if (card.repetitions === 0) card.interval = 1;
    else if (card.repetitions === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ef);
    card.repetitions += 1;
  } else {
    card.repetitions = 0;
    card.interval = 1;
  }
  card.ef = card.ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  if (card.ef < 1.3) card.ef = 1.3;
  card.due = Date.now() + card.interval * DAY_MS;
}

/* ============================================================
   Queue / current-card selection
   ============================================================ */
function queue() {
  // due-first, then soonest upcoming; there's always a "current" card.
  return [...state.cards].sort((a, b) => a.due - b.due);
}
function dueCount() {
  const now = Date.now();
  return state.cards.filter(c => c.due <= now).length;
}

let current = null;        // the card object being shown
let side = "de";           // which side is the prompt: "de" or "en"
let revealed = false;      // has the answer been shown (=> lapse recorded)
let currentExample = null; // example held stable across a single card viewing
const enriching = new Set();   // card ids currently being enriched (examples/alts/ru)

function pickCurrent() {
  const q = queue();
  current = q[0] || null;
  revealed = false;
  side = Math.random() < 0.5 ? "de" : "en";
  currentExample = null;   // fresh random example is chosen on next render
  if (current) maybeEnrich(current);
}

function live(card) { return card && state.cards.find(x => x.id === card.id); }

// Choose a random usage phrase to show with the card. Skips any phrase whose
// prompt-side is identical to the shown word, so the example always differs
// from the word itself (the "not 1-to-1 the same word" rule).
function pickExample(card, promptSide) {
  const list = card && card.examples;
  if (!Array.isArray(list) || !list.length) return null;
  const shown = (promptSide === "de" ? card.de : card.en).toLowerCase().trim();
  const usable = list.filter((e) => {
    const p = (promptSide === "de" ? e.de : e.en || "").toLowerCase().trim();
    const a = (promptSide === "de" ? e.en : e.de || "").trim();
    return p && a && p !== shown;
  });
  if (!usable.length) return null;
  const e = usable[Math.floor(Math.random() * usable.length)];
  return promptSide === "de"
    ? { prompt: e.de, answer: e.en }
    : { prompt: e.en, answer: e.de };
}

// Bare German headword for a card ("der Einwand" -> "Einwand"), used to look the
// word up again and to match its phrases.
function baseGerman(card) {
  return stripMarkers(card.de).replace(/^(der|die|das)\s+/i, "").trim();
}

// Lazily fill in everything a card needs beyond its main pair — usage examples,
// the other-translations lists (both directions), and the Russian line — the
// first time it surfaces, then cache it all on the card. Existing cards from
// before this feature have these fields missing and get backfilled here; new
// cards already carry examples + the same-direction alternatives from add time,
// so this only fetches the reverse-direction alternatives and Russian for them.
// Each piece is best-effort: a failed lookup is left unset so it retries when
// the card next appears. Runs silently in the background.
async function maybeEnrich(card) {
  if (!card) return;
  const need = {
    examples: !card.examplesFetched,
    altEn: !Array.isArray(card.altEn),
    altDe: !Array.isArray(card.altDe),
    ru: !Array.isArray(card.ru),
  };
  if (!need.examples && !need.altEn && !need.altDe && !need.ru) return;
  if (enriching.has(card.id)) return;
  enriching.add(card.id);

  const baseDe = baseGerman(card);       // "Balken"
  const baseEn = stripMarkers(card.en);  // "bar"
  let changed = false, exChanged = false;

  try {
    // The German headword's page yields English alternatives + usage examples.
    if (need.altEn || need.examples) {
      let pairs = null;
      if (baseDe) { try { ({ pairs } = await backend.lookup(baseDe)); } catch {} }
      const c = live(card);
      if (c) {
        if (need.examples && (pairs || !baseDe)) {
          c.examples = pairs ? deriveExamples(pairs, baseDe, baseEn) : (c.examples || []);
          c.examplesFetched = true; changed = exChanged = true;
        }
        if (need.altEn && (pairs || !baseDe)) {
          c.altEn = pairs ? altWords(pairs, baseDe, "de") : []; changed = true;
        }
      }
    }
    // The English headword's page yields German alternatives (with articles).
    if (need.altDe) {
      let pairs = null;
      if (baseEn) { try { ({ pairs } = await backend.lookup(baseEn)); } catch {} }
      const c = live(card);
      if (c && (pairs || !baseEn)) { c.altDe = pairs ? altWords(pairs, baseEn, "en") : []; changed = true; }
    }
    // Russian, in the direction the card was added from.
    if (need.ru) {
      try {
        const ru = await lookupRussianForCard(card, baseDe, baseEn);
        const c = live(card);
        if (c) { c.ru = ru; changed = true; }
      } catch {}
    }
    const c = live(card);
    if (c && c.examplesFetched && Array.isArray(c.altEn) && Array.isArray(c.altDe) && Array.isArray(c.ru)) {
      c.extrasFetched = true;
    }
    if (changed) {
      save();
      if (current && current.id === card.id) { if (exChanged) currentExample = null; render(); }
    }
  } finally {
    enriching.delete(card.id);
  }
}

/* ============================================================
   Rendering
   ============================================================ */
const main = document.getElementById("main");
const footer = document.getElementById("footer");

function render() {
  if (!current) {
    main.innerHTML = `
      <div class="empty">
        <div class="big">🗂️</div>
        <p>No cards yet.<br>Tap <b>＋ Add word</b> to look up a German or English word.</p>
      </div>`;
    footer.textContent = "0 cards";
    return;
  }

  const promptWord = side === "de" ? current.de : current.en;
  const answerWord = side === "de" ? current.en : current.de;

  // Pick the example once per viewing; keep it stable across the reveal so the
  // phrase and its translation line up.
  if (currentExample === null) currentExample = pickExample(current, side);
  const ex = currentExample;

  // Extra info shown once revealed: up to 4 other translations in the ANSWER
  // language (German ones carry their article), then the Russian line as a final
  // bullet (top 3, comma-joined). The card's own answer word is filtered out.
  const answerLang = side === "de" ? "en" : "de";
  const rawAlts = (answerLang === "de" ? current.altDe : current.altEn) || [];
  const seenAlt = new Set([answerWord.toLowerCase()]);
  const alts = [];
  for (const a of rawAlts) {
    const disp = answerLang === "de" ? withArticle(a) : stripMarkers(a);
    const key = disp.toLowerCase();
    if (!disp || seenAlt.has(key)) continue;
    seenAlt.add(key);
    alts.push(disp);
    if (alts.length === 4) break;
  }
  const ruLine = (current.ru || []).slice(0, 3).join(", ");

  main.innerHTML = `
    <div class="card" id="card">
      <div class="prompt">${esc(promptWord)}</div>
      ${ex ? `<div class="example">${esc(ex.prompt)}</div>` : ``}
      ${revealed ? `
        <div class="answer">
          <div class="word">${esc(answerWord)}</div>
          ${ex ? `<div class="example-answer">${esc(ex.answer)}</div>` : ``}
          ${(alts.length || ruLine) ? `<ul class="alts">
            ${alts.map(a => `<li>${esc(a)}</li>`).join("")}
            ${ruLine ? `<li class="ru">${esc(ruLine)}</li>` : ``}
          </ul>` : ``}
        </div>
      ` : ``}
    </div>
    <div class="controls">
      <button class="btn" id="nextBtn">Next ›</button>
    </div>`;

  document.getElementById("card").addEventListener("click", onReveal);
  document.getElementById("nextBtn").addEventListener("click", onNext);

  const total = state.cards.length;
  footer.textContent = `${total} card${total === 1 ? "" : "s"} · ${dueCount()} due`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

/* ============================================================
   Interactions
   ============================================================ */
function onReveal() {
  if (revealed || !current) return;
  revealed = true;
  grade(current, 2);   // revealing = lapse
  save();
  render();
}

function onNext() {
  if (current && !revealed) {
    grade(current, 5);  // knew it => pass
    save();
  }
  // if revealed, grade was already applied on reveal
  pickCurrent();
  render();
}

/* ============================================================
   Add word  ->  backend lookup (both directions) -> card
   ============================================================ */
const addBtn = document.getElementById("addBtn");
addBtn.addEventListener("click", promptAndAdd);

function promptAndAdd() {
  const input = prompt("Add a word (German or English):");
  if (input && input.trim()) runAdd(input.trim());
}

async function runAdd(word) {
  setAdding(true);
  try {
    const { pairs, suggestions } = await backend.lookup(word);
    const rows = buildTranslationRows(pairs, word);

    if (rows.length > 1) {                   // multiple senses — let the user pick the default
      showTranslations(word, rows, pairs);
    } else if (rows.length === 1) {          // a single 1:1 sense — just save it
      commitCard(rows[0], pairs, rows[0].srcLang);
    } else if (suggestions.length) {         // misspelled? offer similar terms
      showChooser(word, suggestions);
    } else {
      // No exact 1:1 match; fall back to dict.cc's best-ranked pair, if any.
      const clean = pairs
        .map(p => ({ de: (p.de || "").trim(), en: (p.en || "").trim() }))
        .filter(p => p.de && p.en);
      const best = clean.length ? bestPair(clean, word) : null;
      if (best) commitCard(best.pair, pairs, inferSrcLang(best.pair, word));
      else toast(`No translation or suggestions for “${word}”.`, "err");
    }
  } catch (err) {
    toast(`Lookup failed: ${err.message}. Is the proxy running?`, "err");
  } finally {
    setAdding(false);
  }
}

function setAdding(on) {
  addBtn.disabled = on;
  addBtn.innerHTML = on ? `<span class="spinner"></span>Looking up…` : "＋ Add word";
}

// Store a chosen pair as a card. German side always carries its article.
// `allPairs` is the full lookup result, from which we mine usage phrases.
function commitCard(pair, allPairs, srcLang) {
  const de = withArticle(pair.de);
  const en = stripMarkers(pair.en);
  const pairs = allPairs || [pair];
  const examples = deriveExamples(pairs, stripMarkers(pair.de), en);
  // The lookup we already did was for the SOURCE word, so `pairs` contains that
  // word's translations into the OTHER language — collect them for free here.
  // The reverse-direction alternatives + Russian are fetched later by enrich().
  const altDe = srcLang === "EN" ? altWords(pairs, en, "en") : null;
  const altEn = srcLang === "DE" ? altWords(pairs, stripMarkers(pair.de), "de") : null;
  const id = cardId(de, en);
  const existing = state.cards.find(c => c.id === id);
  if (existing) {
    if (!existing.examplesFetched || !(existing.examples || []).length) {
      existing.examples = examples;       // top up an older/empty card
      existing.examplesFetched = true;
    }
    if (srcLang && !existing.srcLang) existing.srcLang = srcLang;
    if (altDe && !Array.isArray(existing.altDe)) existing.altDe = altDe;
    if (altEn && !Array.isArray(existing.altEn)) existing.altEn = altEn;
    save();
    toast(`Already have “${de}”.`);
  } else {
    const card = newCard(de, en, examples);
    card.srcLang = srcLang || null;
    if (altDe) card.altDe = altDe;
    if (altEn) card.altEn = altEn;
    state.cards.push(card);
    save();
    toast(`Added “${de} — ${en}”.`, "ok");
  }
  pickCurrent();   // show a card right away (per spec)
  render();
}

// Which language the typed word came from, for the fallback path where the
// chooser didn't record it. Matches the typed word against each side of the
// chosen pair; null when neither matches (enrich() then tries both RU directions).
function inferSrcLang(pair, word) {
  const q = matchKey(word);
  if (matchKey(pair.en) === q) return "EN";
  if (matchKey(pair.de) === q) return "DE";
  return null;
}

// Remove {gender}/{pos} annotations and [notes] from a side.
function stripMarkers(s) {
  return s.replace(/\s*\{[^}]*\}/g, "").replace(/\[[^\]]*\]/g, "").replace(/\s+/g, " ").trim();
}

// German nouns always get their definite article: {m}->der {f}/{pl}->die {n}->das.
// Non-nouns (verbs, adjectives — no gender marker) are returned unchanged.
function withArticle(germanSide) {
  const m = germanSide.match(/\{([^}]*)\}/);
  const noun = stripMarkers(germanSide);
  if (!m) return noun;
  const g = m[1].toLowerCase();
  let art = "";
  if (g.includes("pl")) art = "die";
  else if (g.startsWith("m")) art = "der";
  else if (g.startsWith("f")) art = "die";
  else if (g.startsWith("n")) art = "das";
  return art ? `${art} ${noun}` : noun;
}

// dict.cc ranks {adj}/verb senses above the plain noun, so index 0 is often
// wrong (e.g. "dog {adj} = Hunde-"). Prefer the pair whose side matches the
// typed word exactly, allowing only a gender marker like {m}/{n}/{pl}.
// Returns { pair, score }.
function bestPair(pairs, word) {
  const target = word.toLowerCase().trim();
  let best = pairs[0], bestScore = -1;
  for (const p of pairs) {
    const score = Math.max(sideScore(p.de, target), sideScore(p.en, target));
    if (score > bestScore) { bestScore = score; best = p; } // ties keep the topmost
  }
  return { pair: best, score: bestScore };
}

function sideScore(side, target) {
  const s = side.toLowerCase().trim();
  if (s === target) return 3;                     // exact match
  const marker = s.match(/\{([^}]*)\}\s*$/);      // trailing {..} annotation
  const base = s.replace(/\s*\{[^}]*\}\s*$/, "").trim();
  if (base === target) {
    // gender markers (m/f/n/pl/sg) are still the clean noun; adj/adv/verb aren't
    return marker && /^(m|f|n|pl|sg)/.test(marker[1]) ? 3 : 1;
  }
  const words = base.split(/\s+/);
  if (words.includes(target)) return 0.5;         // appears as a token
  return 0;
}

/* ============================================================
   Translation chooser — pick which sense becomes the card
   ============================================================ */

// Build the list of 1:1 single-word translation options for `word`.
// A row qualifies when one side of a lookup pair is EXACTLY the typed word
// (ignoring {gender}/{pos} markers, [notes], and a trailing hyphen like the
// adjective form "Leber-"), and the other side is a single word. The matching
// side is the "source"; we record its language so the chooser can label rows
// when the same spelling exists in both languages (German "bar" → cash vs
// English "bar" → Balken). Multi-word phrases like "Leber-Linie" are excluded
// because the headword no longer matches 1:1.
function buildTranslationRows(pairs, word) {
  const q = matchKey(word);
  const byKey = new Map();
  for (const p of pairs) {
    const en = (p.en || "").trim();
    let de = (p.de || "").trim();
    if (!de || !en) continue;
    // Prefer treating the English side as the source when both sides match
    // (homographs like en "bar" = de "Bar"), so the translation is the more
    // useful German word rather than an echo of the same spelling.
    let srcLang = null;
    if (matchKey(en) === q && isSingleWord(de)) srcLang = "EN";
    else if (matchKey(de) === q && isSingleWord(en)) srcLang = "DE";
    else continue;
    if (srcLang === "DE") de = deHyphen(de);   // combining form "Leber-" -> "Leber"
    const trans = stripMarkers(srcLang === "DE" ? en : de).toLowerCase();
    const key = srcLang + "|" + trans;         // dedupe repeated senses/homographs
    const rank = srcLang === "DE" ? deRank(de) : 1;
    const prev = byKey.get(key);
    // On a duplicate, keep the variant with the cleaner headword — a gendered
    // noun ("Leber {f}") beats the article-less combining form — so the saved
    // card gets its article.
    if (!prev || rank > prev._rank) byKey.set(key, { de, en, srcLang, _rank: rank });
  }
  return [...byKey.values()].map(({ de, en, srcLang }) => ({ de, en, srcLang }));
}

// Normalized key for exact-word matching: drop {markers}/[notes], a trailing
// hyphen (dict.cc's combining form "Leber-"), and case.
function matchKey(s) {
  return stripMarkers(s).toLowerCase().replace(/-+$/, "").trim();
}

// A translation side is a single word: exactly one token, and not a bare
// prefix/suffix form ("-bar", "Leber-"). Internal hyphens ("T-Shirt") are kept.
function isSingleWord(s) {
  const c = stripMarkers(s);
  return /^\S+$/.test(c) && !/^-|-$/.test(c);
}

// Strip a trailing hyphen from a German headword, keeping any {gender} marker.
function deHyphen(s) {
  return s.replace(/-+(\s*\{[^}]*\})?\s*$/, "$1").trim();
}

// Rank a German source cell so dedupe prefers the standalone noun (gendered,
// gets an article) over the article-less combining form.
function deRank(de) {
  if (/\{\s*(m|f|n|pl)/i.test(de)) return 2;
  return /-\s*$/.test(stripMarkers(de)) ? 0 : 1;
}

// Popup: a scrollable table of candidate translations. Left column is the typed
// word (with a DE/EN badge when it exists in both languages); right column is
// each single-word translation. Tapping a row saves it as the card.
function showTranslations(word, rows, allPairs) {
  const mixed = rows.some(r => r.srcLang === "DE") && rows.some(r => r.srcLang === "EN");
  const el = document.getElementById("chooser");
  const body = rows.map((r, i) => {
    const src = esc(stripMarkers(r.srcLang === "DE" ? r.de : r.en));
    const tr  = esc(r.srcLang === "DE" ? stripMarkers(r.en) : withArticle(r.de));
    const badge = mixed ? `<span class="lang-badge">${r.srcLang}</span>` : "";
    return `<tr class="pick" data-i="${i}">
        <td class="src">${badge}${src}</td>
        <td class="arrow">→</td>
        <td class="trg">${tr}</td>
      </tr>`;
  }).join("");
  el.innerHTML = `
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-title">Choose a translation</div>
      <div class="sheet-sub">Pick the sense to save as your card for “${esc(word)}”.</div>
      <div class="tt-wrap"><table class="tt"><tbody>${body}</tbody></table></div>
      <button class="btn ghost" id="chooserCancel">Cancel</button>
    </div>`;
  el.hidden = false;
  el.querySelectorAll(".pick").forEach(row =>
    row.addEventListener("click", () => {
      const r = rows[+row.dataset.i];
      hideChooser();
      commitCard({ de: r.de, en: r.en }, allPairs, r.srcLang);
    })
  );
  document.getElementById("chooserCancel").addEventListener("click", hideChooser);
  el.addEventListener("click", e => { if (e.target === el) hideChooser(); });
}

/* ============================================================
   Suggestion chooser (shown when a word isn't found)
   ============================================================ */
function showChooser(word, suggestions) {
  const list = suggestions.slice(0, 12);
  const el = document.getElementById("chooser");
  el.innerHTML = `
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-title">“${esc(word)}” not found</div>
      <div class="sheet-sub">Did you mean one of these?</div>
      <div class="sheet-list">
        ${list.map(s => `<button class="btn secondary pick" data-word="${esc(s)}">${esc(s)}</button>`).join("")}
      </div>
      <button class="btn ghost" id="chooserCancel">Cancel</button>
    </div>`;
  el.hidden = false;
  el.querySelectorAll(".pick").forEach(b =>
    b.addEventListener("click", () => { hideChooser(); runAdd(b.dataset.word); })
  );
  document.getElementById("chooserCancel").addEventListener("click", hideChooser);
  el.addEventListener("click", e => { if (e.target === el) hideChooser(); });
}
function hideChooser() {
  const el = document.getElementById("chooser");
  el.hidden = true;
  el.innerHTML = "";
}

/* ============================================================
   Toast
   ============================================================ */
let toastTimer = null;
function toast(msg, kind) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show" + (kind ? " " + kind : "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ""; }, 3200);
}

/* ============================================================
   Boot
   ============================================================ */
(async function boot() {
  try {
    state = normalize(await store.read());
  } catch (err) {
    toast(`Could not load saved cards: ${err.message}`, "err");
  }
  pickCurrent();
  render();
})();
</script>
</body>
</html>
